name: 'ctxloom PR review'
# Marketplace constraint: description MUST be < 125 characters.
# The longer prose (architecture / what's posted / how it differs from
# LLM-based reviewers) lives in apps/pr-bot/README.md; the Marketplace
# listing is just the one-liner that fits in the search-result card.
description: "Risk-scored PR review using your repo's local dependency graph. Inline + summary comments. No LLM, no external services."
author: 'Codzign'
branding:
  icon: 'git-pull-request'
  color: 'purple'

inputs:
  github-token:
    description: >-
      GitHub token used to post comments. Defaults to the GITHUB_TOKEN
      provided by the Actions runner. Your workflow must declare
      `permissions: { pull-requests: write, contents: read, checks: write }`.
    required: false
    default: ${{ github.token }}

# Docker action backed by a pre-built image on GHCR. Built and pushed
# by `.github/workflows/pr-bot-publish-image.yml` on every `v*` tag.
#
# Why pre-built (not `image: Dockerfile`): GitHub's built-in Dockerfile
# resolution uses the action's directory (apps/pr-bot/) as the Docker
# build context. Our Dockerfile reaches into ../../packages/core/ for
# the workspace dep, which only resolves from the repo root. Building
# in our own workflow with the monorepo as context, pushing to GHCR,
# and pointing here at `docker://ghcr.io/...` sidesteps the limitation.
runs:
  using: 'docker'
  image: 'docker://ghcr.io/kodiii/ctxloom-pr-bot:v1'
  env:
    GITHUB_TOKEN: ${{ inputs.github-token }}
